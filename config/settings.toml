[project]
# 开启调试模式，输出堆栈信息
debug = true
log_level = "INFO"

[data]
# data_lake 根目录，确定了市场数据和因子数据的存放的地点
# 使用相对路径，相对于项目根目录
data_lake_dir = "data_lake"
market_data_dir = "market_data"
factors_dir = "factors"


# Tushare 配置
# Token 严禁明文写入此文件
# 请在项目根目录的 .env 文件中设置：TUSHARE_TOKEN=<your_token>
# ConfigLoader 会自动从环境变量读取并注入
[tushare]

# ZVT 配置
[zvt]
# zvt的家目录，储存元数据、缓存文件或默认的 SQLite 数据库
zvt_home = ".zvt"

# DuckDB 配置
[duckdb]
# 持续的 DuckDB 文件路径（可选，如果仅依赖 Parquet，也可以是 :memory:）
db_path = "data_lake/quant.duckdb"

# Qlib 配置
[qlib]
provider_uri = "data_lake/qlib_bin"
region = "cn"

[backtest]
# 回测基础配置
initial_capital = 1000000.0   # 初始资金：100 万

[backtest.cost]
# 交易成本（A 股标准）
# 将 apply_cost=True 传入 BatchBacktestRunner 时生效
commission_rate = 0.0003   # 双边佣金率：万三（买卖各收）
stamp_duty      = 0.0005   # 印花税：卖出单边 0.05%
slippage        = 0.0002   # 滑点估算：万二
min_commission  = 5.0      # 单笔最低佣金：5 元

[execution]
# 交易网关配置
gateway = "ctp" # or xtquant
sim_mode = true

[prefect]
# Flow 配置
parallel_execution = true
max_workers = 12
